<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería 2025 | Peña Los Magníficos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header id="main-header">
        <nav class="container nav-container">
            <a href="index.html" class="logo"><img src="imagenes/logo-magnificos.jpg" alt="Logo" class="logo-img"> PEÑA&nbsp;<span>ARCHIVOS</span></a>
            <ul class="nav-links">
                <li><a href="index.html#inicio">Inicio</a></li>
                <li><a href="index.html#nosotros">Nosotros</a></li>
                <li class="has-dropdown">
                    <a href="index.html#actividades">Actividades <i class="fas fa-chevron-down"></i></a>
                    <ul class="dropdown">
                        <li><a href="galeria-2025.html">2025</a></li>
                        <li><a href="galeria-2024.html">2024</a></li>
                        <li><a href="galeria-2023.html">2023</a></li>
                        <li><a href="galeria-2022.html">2022</a></li>
                        <li><a href="galeria-2021.html">2021</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>

    <section class="galeria-hero" style="background-image: url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?auto=format&fit=crop&q=80&w=1920');">
        <div class="galeria-hero-content">
            <span class="galeria-year-badge">Archivo Dinámico</span>
            <h1>GALERÍA 2025</h1>
            <p id="gallery-status">Cargando memorias del servidor...</p>
        </div>
    </section>

    <main class="galeria-grid" id="main-gallery-grid">
        <!-- Se carga desde la base de datos -->
    </main>

    <a href="index.html" class="btn-back-float"><i class="fas fa-home"></i></a>

    <footer class="galeria-footer">
        <h2>PEÑA LOS MAGNÍFICOS</h2>
        <p>&copy; 2026 Todos los derechos reservados. Zaragoza.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        const loadGallery = async () => {
            const grid = document.getElementById('main-gallery-grid');
            const status = document.getElementById('gallery-status');
            
            try {
                const response = await fetch('http://localhost:3000/api/gallery?year=2025');
                const images = await response.json();
                
                if (images.length === 0) {
                    status.innerText = "Aún no hay fotos publicadas para este año.";
                    grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 5rem; opacity: 0.5;"><i class="fas fa-camera-retro" style="font-size: 4rem; display: block; margin-bottom: 1rem;"></i><p>El administrador pronto subirá contenido.</p></div>';
                    return;
                }

                status.innerText = `Mostrando ${images.length} momentos inolvidables.`;
                grid.innerHTML = images.map((img, index) => `
                    <div class="galeria-card reveal" style="transition-delay: ${index * 100}ms">
                        <img src="${img.image}" alt="${img.title}">
                        <div class="galeria-card-overlay">
                            <h3>${img.title || 'Peña Los Magníficos'}</h3>
                            <p>${img.date || 'Evento 2025'}</p>
                        </div>
                    </div>
                `).join('');

                // Trigger reveal
                setTimeout(() => {
                    document.querySelectorAll('.galeria-card').forEach(c => c.classList.add('reveal'));
                }, 100);

            } catch (err) {
                status.innerText = "Error al conectar con el archivo histórico.";
                console.error(err);
            }
        };

        window.addEventListener('load', loadGallery);
    </script>
</body>
</html>
