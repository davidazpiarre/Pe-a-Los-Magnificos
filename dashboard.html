<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control | Peña Los Magníficos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #f8f9fa;
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: var(--black);
            color: white;
            padding: 2rem 1rem;
        }

        .sidebar h2 {
            color: white;
            font-size: 1.2rem;
            margin-bottom: 3rem;
            text-align: center;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .sidebar-nav a {
            padding: 1rem;
            border-radius: 8px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-nav a:hover,
        .sidebar-nav a.active {
            background: var(--primary-blue);
        }

        .main-content {
            flex: 1;
            padding: 3rem;
        }

        .dash-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .stat-card i {
            font-size: 2rem;
            color: var(--primary-blue);
            margin-bottom: 1rem;
        }

        .stat-card h3 {
            font-size: 0.9rem;
            color: #666;
            text-transform: uppercase;
        }

        .stat-card p {
            font-size: 2rem;
            font-weight: 800;
            color: var(--black);
        }

        .data-table {
            width: 100%;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .data-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            background: var(--light-gray);
            padding: 1.2rem;
            text-align: left;
            font-size: 0.9rem;
        }

        .data-table td {
            padding: 1.2rem;
            border-top: 1px solid var(--light-gray);
            font-size: 0.9rem;
        }

        .action-btns {
            display: flex;
            gap: 10px;
        }

        .btn-sm {
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            font-size: 0.75rem;
            border: none;
            cursor: pointer;
        }

        .btn-edit {
            background: var(--medium-gray);
        }

        .btn-delete {
            background: #ff4757;
            color: white;
        }

        #admin-name {
            font-weight: 700;
            color: var(--primary-blue);
        }
    </style>
</head>

<body>
    <aside class="sidebar">
        <h2>MAGNÍFICOS<span> DASH</span></h2>
        <nav class="sidebar-nav">
            <a href="#" class="active"><i class="fas fa-chart-line"></i> Dashboard</a>
            <a href="#blogs-manage"><i class="fas fa-blog"></i> Gestionar Blogs</a>
            <a href="#users-manage"><i class="fas fa-users"></i> Socios</a>
            <a href="index.html" style="margin-top: auto; color: #ff4757;"><i class="fas fa-sign-out-alt"></i> Salir al Sitio</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="dash-header">
            <h1>Panel de Control: <span id="admin-name">Cargando...</span></h1>
            <button class="btn-add-blog" id="dash-add-blog">+ Nuevo Artículo</button>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <i class="fas fa-blog"></i>
                <h3>Artículos</h3>
                <p id="count-blogs">0</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-users"></i>
                <h3>Socios</h3>
                <p id="count-users">1</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-calendar-alt"></i>
                <h3>Eventos</h3>
                <p>12</p>
            </div>
        </div>

        <section id="blogs-manage">
            <h2 style="margin-bottom: 1.5rem;">Gestión de Noticias</h2>
            <div class="data-table">
                <table>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Título</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="dash-blog-list">
                        <!-- JS Loaded -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <div class="modal" id="blog-modal">
        <div class="modal-content">
            <span class="modal-close" id="blog-modal-close">&times;</span>
            <h2 id="blog-modal-title">Gestión de Blog</h2>
            <form class="blog-form" id="blog-form">
                <input type="hidden" id="blog-id">
                <div class="form-group">
                    <label>Título del Artículo</label>
                    <input type="text" id="blog-title" placeholder="Ej: Nueva cena el viernes" required>
                </div>
                <div class="form-group">
                    <label>Imagen (URL)</label>
                    <input type="url" id="blog-image" placeholder="https://ejemplo.com/foto.jpg">
                </div>
                <div class="form-group">
                    <label>Contenido</label>
                    <textarea id="blog-content" placeholder="Escribe aquí la noticia completa..." required></textarea>
                </div>
                <button type="submit" class="btn-login" style="width: 100%;">Guardar Noticia</button>
            </form>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('magnificos_token');
        const userData = localStorage.getItem('magnificos_user');
        const user = userData ? JSON.parse(userData) : null;

        // Comprobación de Acceso Robusta
        if (!token || !user || user.role !== 'admin') {
            console.error("Acceso no autorizado al Dashboard");
            alert("No tienes permiso para acceder aquí. Inicia sesión como administrador.");
            window.location.href = 'index.html';
        } else {
            document.getElementById('admin-name').innerText = user.name;
        }

        const loadDashBlogs = async () => {
            try {
                const res = await fetch('http://localhost:3000/api/blogs');
                const blogs = await res.json();
                document.getElementById('count-blogs').innerText = blogs.length;
                
                const list = document.getElementById('dash-blog-list');
                list.innerHTML = blogs.map(blog => `
                    <tr>
                        <td>${blog.date}</td>
                        <td><strong>${blog.title}</strong></td>
                        <td class="action-btns">
                            <button class="btn-sm btn-edit" onclick="openEdit(${blog.id})"><i class="fas fa-edit"></i></button>
                            <button class="btn-sm btn-delete" onclick="deleteBlog(${blog.id})"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error("Error cargando blogs:", err);
            }
        };

        window.deleteBlog = async (id) => {
            if (confirm('¿Estás seguro de eliminar esta noticia?')) {
                const res = await fetch(`http://localhost:3000/api/blogs/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) loadDashBlogs();
                else alert("No se pudo eliminar. Verifica tu sesión.");
            }
        };

        window.openEdit = async (id) => {
            const res = await fetch('http://localhost:3000/api/blogs');
            const blogs = await res.json();
            const blog = blogs.find(b => b.id === id);
            if (blog) {
                document.getElementById('blog-id').value = blog.id;
                document.getElementById('blog-title').value = blog.title;
                document.getElementById('blog-image').value = blog.image;
                document.getElementById('blog-content').value = blog.content;
                document.getElementById('blog-modal-title').innerText = 'Editar Artículo';
                document.getElementById('blog-modal').classList.add('active');
            }
        };

        document.getElementById('dash-add-blog').onclick = () => {
            document.getElementById('blog-form').reset();
            document.getElementById('blog-id').value = '';
            document.getElementById('blog-modal-title').innerText = 'Nuevo Artículo';
            document.getElementById('blog-modal').classList.add('active');
        };

        document.getElementById('blog-modal-close').onclick = () => {
            document.getElementById('blog-modal').classList.remove('active');
        };

        document.getElementById('blog-form').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('blog-id').value;
            const data = {
                title: document.getElementById('blog-title').value.trim(),
                image: document.getElementById('blog-image').value.trim(),
                content: document.getElementById('blog-content').value.trim()
            };

            if (!data.title || !data.content) {
                alert("El título y el contenido son obligatorios.");
                return;
            }

            const method = id ? 'PUT' : 'POST';
            const url = id ? `http://localhost:3000/api/blogs/${id}` : 'http://localhost:3000/api/blogs';

            try {
                const response = await fetch(url, {
                    method,
                    headers: { 
                        'Content-Type': 'application/json', 
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    document.getElementById('blog-modal').classList.remove('active');
                    loadDashBlogs();
                } else {
                    const err = await response.json();
                    alert("Error al guardar: " + err.message);
                }
            } catch (err) {
                alert("Error de conexión con el servidor.");
            }
        };

        loadDashBlogs();
    </script>
</body>

</html>
