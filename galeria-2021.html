<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería 2021 | Peña Los Magníficos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header id="main-header">
        <nav class="container nav-container">
            <a href="index.html" class="logo"><img src="imagenes/logo-magnificos.jpg" alt="Logo" class="logo-img"> PEÑA&nbsp;<span>ARCHIVOS</span></a>
            <ul class="nav-links">
                <li><a href="index.html#inicio">Inicio</a></li>
                <li><a href="index.html#nosotros">Nosotros</a></li>
                <li class="has-dropdown">
                    <a href="index.html#actividades">Actividades <i class="fas fa-chevron-down"></i></a>
                    <ul class="dropdown">
                        <li><a href="galeria-2025.html">2025</a></li>
                        <li><a href="galeria-2024.html">2024</a></li>
                        <li><a href="galeria-2023.html">2023</a></li>
                        <li><a href="galeria-2022.html">2022</a></li>
                        <li><a href="galeria-2021.html">2021</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>

    <section class="galeria-hero" style="background-image: url('https://images.unsplash.com/photo-1540747913346-19e3adca174f?auto=format&fit=crop&q=80&w=1920');">
        <div class="galeria-hero-content">
            <span class="galeria-year-badge">Archivo Dinámico</span>
            <h1>GALERÍA 2021</h1>
            <p id="gallery-status">Sincronizando...</p>
        </div>
    </section>

    <main class="galeria-grid" id="main-gallery-grid"></main>

    <a href="index.html" class="btn-back-float"><i class="fas fa-home"></i></a>

    <footer class="galeria-footer">
        <h2>PEÑA LOS MAGNÍFICOS</h2>
        <p>&copy; 2026 Todos los derechos reservados.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        const loadGallery = async () => {
            const grid = document.getElementById('main-gallery-grid');
            const status = document.getElementById('gallery-status');
            try {
                const response = await fetch('http://localhost:3000/api/gallery?year=2021');
                const images = await response.json();
                if (images.length === 0) {
                    status.innerText = "No hay fotos publicadas en 2021 aún.";
                    grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 5rem; opacity: 0.5;"><i class="fas fa-camera-retro" style="font-size: 4rem;"></i></div>';
                    return;
                }
                status.innerText = `${images.length} fotos recuperadas.`;
                grid.innerHTML = images.map((img, i) => `
                    <div class="galeria-card reveal" style="transition-delay: ${i * 100}ms">
                        <img src="${img.image}">
                        <div class="galeria-card-overlay">
                            <h3>${img.title || 'Evento 2021'}</h3>
                            <p>${img.date}</p>
                        </div>
                    </div>
                `).join('');
                setTimeout(() => document.querySelectorAll('.galeria-card').forEach(c => c.classList.add('reveal')), 100);
            } catch (err) { status.innerText = "Error de conexión."; }
        };
        window.addEventListener('load', loadGallery);
    </script>
</body>
</html>
